name: Update book title translations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-book-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update portfolio translations
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          original = s
          sr_title = 'Novo ropstvo'
          cz_title = 'Nové otroctví'
          en_title = ''.join(chr(c) for c in [78,101,119,32,83,108,97,118,101,114,121])
          sr_about = 'Ja sam Marjan Mitrović, autor, developer i kreator AI alata koji živi u Pragu.'

          s = s.replace('<h3>Nové otroctví</h3>', f'<h3 data-i18n="bookTitle">{sr_title}</h3>')
          s = s.replace('<h3 data-i18n="bookTitle">Nové otroctví</h3>', f'<h3 data-i18n="bookTitle">{sr_title}</h3>')
          s = s.replace('<span class="tag">literatura</span><span class="tag">technologie</span>', '<span class="tag" data-i18n="bookTag1">literatura</span><span class="tag" data-i18n="bookTag2">tehnologija</span>')
          s = s.replace('<span class="tag" data-i18n="bookTag1">literatura</span><span class="tag" data-i18n="bookTag2">technologie</span>', '<span class="tag" data-i18n="bookTag1">literatura</span><span class="tag" data-i18n="bookTag2">tehnologija</span>')
          s = s.replace('bookBadge:"Knjiga",safetyBadge:', f'bookBadge:"Knjiga",bookTitle:"{sr_title}",bookTag1:"literatura",bookTag2:"tehnologija",safetyBadge:')
          s = s.replace('bookBadge:"Kniha",safetyBadge:', f'bookBadge:"Kniha",bookTitle:"{cz_title}",bookTag1:"literatura",bookTag2:"technologie",safetyBadge:')
          s = s.replace('bookBadge:"Book",safetyBadge:', f'bookBadge:"Book",bookTitle:"{en_title}",bookTag1:"literature",bookTag2:"technology",safetyBadge:')
          s = s.replace('bookBadge:"Knjiga",bookTitle:"Novo ropstvo",safetyBadge:', 'bookBadge:"Knjiga",bookTitle:"Novo ropstvo",bookTag1:"literatura",bookTag2:"tehnologija",safetyBadge:')
          s = s.replace('bookBadge:"Kniha",bookTitle:"Nové otroctví",safetyBadge:', 'bookBadge:"Kniha",bookTitle:"Nové otroctví",bookTag1:"literatura",bookTag2:"technologie",safetyBadge:')
          s = s.replace(f'bookBadge:"Book",bookTitle:"{en_title}",safetyBadge:', f'bookBadge:"Book",bookTitle:"{en_title}",bookTag1:"literature",bookTag2:"technology",safetyBadge:')

          s = s.replace('<p class="lead" data-i18n="aboutLead">Jsem Marjan Mitrović, autor, vývojář a tvůrce AI nástrojů žijící v Praze.</p>', f'<p class="lead" data-i18n="aboutLead">{sr_about}</p>')
          s = s.replace('aboutLead:"Jsem Marjan Mitrović, autor, vývojář a tvůrce AI nástrojů žijící v Praze."', f'aboutLead:"{sr_about}"', 1)

          if s != original:
              p.write_text(s, encoding='utf-8')
              print('Portfolio translations updated.')
          else:
              print('No changes needed.')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Translate Serbian about lead"
            git push
          fi

