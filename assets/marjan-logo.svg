<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Marjan Mitrović logo</title>
  <desc id="desc">Professional MM monogram logo for Marjan Mitrović.</desc>
  <defs>
    <linearGradient id="metal" x1="80" y1="70" x2="430" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
