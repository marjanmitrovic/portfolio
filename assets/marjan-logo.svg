<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Marjan Mitrović logo</title>
  <desc id="desc">Clean professional MM monogram logo for Marjan Mitrović.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171a27"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="edge" x1="80" y1="56" x2="432" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.52" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mono" x1="130" y1="150" x2="382" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#e6edf8"/>
      <stop offset="1" stop-color="#93a4bd"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="34" y="34" width="444" height="444" rx="106" fill="url(#edge)"/>
  <rect x="48" y="48" width="416" height="416" rx="94" fill="url(#bg)"/>
  <rect x="82" y="82" width="348" height="348" rx="72" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <path d="M126 354V158h42l88 108 88-108h42v196h-50V239l-80 98-80-98v115h-50Z" fill="url(#mono)"/>
    <path d="M179 196 256 291l77-95v58l-77 94-77-94v-58Z" fill="#ffffff" opacity="0.18"/>
  </g>

  <path d="M126 388h260" stroke="url(#edge)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="386" cy="388" r="8" fill="#7dd3fc" opacity="0.95"/>
