name: Update portfolio translations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-book-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update portfolio translations
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          original = s
          sr_about = 'Ja sam Marjan Mitrović, autor, developer i kreator AI alata koji živi u Pragu.'
          cz_about = 'Jsem Marjan Mitrović, autor, vývojář a tvůrce AI nástrojů žijící v Praze.'

          s = s.replace('heroEyebrow:"Autor • AI developer • founder"', 'heroEyebrow:"Autor • AI developer • osnivač"')
          s = s.replace('heroEyebrow:"Autor • AI vývojář • founder"', 'heroEyebrow:"Autor • AI vývojář • zakladatel"')

          s = s.replace('aboutLead:"Jsem Marjan Mitrović, autor, vývojář a tvůrce AI nástrojů žijící v Praze."', f'aboutLead:"{sr_about}"', 1)
          s = s.replace('cz:{brandSub:', 'cz:{brandSub:', 1)
          s = s.replace('aboutLead:"Ja sam Marjan Mitrović, autor, developer i kreator AI alata koji živi u Pragu.",aboutText:"Píšu knihy', f'aboutLead:"{cz_about}",aboutText:"Píšu knihy')

          if s != original:
              p.write_text(s, encoding='utf-8')
              print('Portfolio translations updated.')
          else:
              print('No changes needed.')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix Czech about lead translation"
            git push
          fi

