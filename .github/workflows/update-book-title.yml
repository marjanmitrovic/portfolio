name: Update portfolio translations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-book-title:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update portfolio translations and preview meta
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          original = s
          base = 'https:' + '//marjanmitrovic.github.io/portfolio/'
          img = base + 'images/og-cover.jpg'
          rows = [
            ('property','og:title','Marjan Mitrovic | Portfolio'),
            ('property','og:description','Apps, books, AI tools and digital products by Marjan Mitrovic.'),
            ('property','og:type','website'),
            ('property','og:url',base),
            ('property','og:site_name','Marjan Mitrovic Portfolio'),
            ('property','og:image',img),
            ('property','og:image:width','1200'),
            ('property','og:image:height','630'),
            ('name','twitter:card','summary_large_image'),
            ('name','twitter:title','Marjan Mitrovic | Portfolio'),
            ('name','twitter:description','Apps, books, AI tools and digital products by Marjan Mitrovic.'),
            ('name','twitter:image',img),
          ]
          meta = '\n'.join([f'  <meta {a}="{b}" content="{c}" />' for a,b,c in rows])
          start = s.find('  <meta property="og:title"')
          if start == -1:
              start = s.find('  <meta name="twitter:card"')
          end = s.find('  <link rel="canonical"')
          if end == -1:
              end = s.find('  <link rel="preconnect"')
          if start != -1 and end != -1 and start < end:
              s = s[:start] + meta + '\n' + s[end:]
          elif end != -1:
              s = s[:end] + meta + '\n' + s[end:]
          if s != original:
              p.write_text(s, encoding='utf-8')
              print('Portfolio preview meta updated.')
          else:
              print('No changes needed.')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add portfolio preview meta tags"
            git push
          fi

